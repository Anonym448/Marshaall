%YAML 1.1
---
# =============================================================
# Marshaall SIEM — Configuración de Suricata
# Asegúrate de ajustar la interfaz de red (af-packet: interface)
# a la interfaz de red correcta de tu sistema (ej: eth0, ens3, etc.)
# =============================================================

##############################################################################
## Opciones generales
##############################################################################

# Modo de operacion: IDS (solo detección) o IPS (detección + prevención inline)
# Por defecto IDS (modo pasivo)

max-pending-packets: 1024

# Directorio donde Suricata guardará sus logs y el archivo eve.json
default-log-dir: /var/log/suricata/

# PID file
pid-file: /var/run/suricata.pid


##############################################################################
## Salidas (outputs)
##############################################################################

outputs:
  # EVE JSON — el formato que consume Marshaall
  - eve-log:
      enabled: yes
      filetype: regular
      filename: eve.json
      # Rotar diariamente el log
      rotate-interval: day
      # Tipos de eventos a registrar
      types:
        - alert:
            payload: yes
            payload-buffer-size: 4kb
            payload-printable: yes
            packet: yes
            metadata: yes
            http-body: yes
            http-body-printable: yes
            tagged-packets: yes
        - anomaly:
            enabled: yes
            types:
              packet: yes
              layer: yes
              stream: yes
        - http:
            extended: yes
        - dns:
            query: yes
            answer: yes
        - tls:
            extended: yes
        - files:
            force-magic: yes
        - smtp:
        - ftp:
        - rdp:
        - nfs:
        - smb:
        - tftp:
        - ike:
        - krb5:
        - snmp:
        - rfb:
        - sip:
        - dhcp:
            enabled: yes
            extended: yes
        - ssh:
        - flow:
        - netflow:
        - stats:
            totals: yes
            threads: no
            deltas: no
            interval: 8

  # Log de alertas en formato clásico (opcional)
  - fast:
      enabled: yes
      filename: fast.log
      append: yes

  # Log de estadísticas
  - stats:
      enabled: yes
      filename: stats.log
      append: yes
      totals: yes
      threads: no


##############################################################################
## Captura de tráfico
## IMPORTANTE: cambia 'eth0' por la interfaz real de tu sistema
## Puedes ver las interfaces con: ip link show
##############################################################################

af-packet:
  - interface: eth5
    # Número de hilos para la captura (ajusta según CPUs disponibles)
    threads: auto
    cluster-id: 99
    cluster-type: cluster_flow
    defrag: yes
    use-mmap: yes
    tpacket-v3: no
    # Si usas modo IPS (inline), descomenta:
    # copy-mode: ips
    # copy-iface: eth1

  # Interfaz loopback para capturar tráfico localhost (pruebas, tráfico interno)
  - interface: lo
    cluster-id: 98
    cluster-type: cluster_flow
    defrag: yes
    checksum-checks: no  # loopback no tiene checksums válidos

# Configuración pcap (alternativa a af-packet)
# En WSL2 se recomienda usar pcap ya que af-packet tiene problemas con el ring buffer:
#   sudo suricata --pcap=lo -c /etc/suricata/suricata.yaml -D -k none
pcap:
  - interface: lo
    checksum-checks: no
  - interface: eth5


##############################################################################
## Detección de amenazas
##############################################################################

# Directorios de reglas
default-rule-path: /var/lib/suricata/rules
rule-files:
  - local.rules

# Umbrales de supresion de alertas
# Suprimir alertas generadas por tráfico interno Docker (contenedores hablando entre sí)
suppress:
  - gen-id: 1
    sig-id: 2210020
    track: by_src
    ip: 0.0.0.0/0

  # Suprimir SYN portscan desde red Docker interna (tráfico normal entre contenedores)
  - gen-id: 1
    sig-id: 1000001
    track: by_src
    ip: 172.17.0.0/16
  - gen-id: 1
    sig-id: 1000001
    track: by_src
    ip: 172.18.0.0/16

  # Suprimir TCP SYN flood desde red Docker interna
  - gen-id: 1
    sig-id: 1000021
    track: by_src
    ip: 172.17.0.0/16
  - gen-id: 1
    sig-id: 1000021
    track: by_src
    ip: 172.18.0.0/16

  # Suprimir UDP flood desde red Docker interna (DNS interno, etc.)
  - gen-id: 1
    sig-id: 1000022
    track: by_src
    ip: 172.17.0.0/16
  - gen-id: 1
    sig-id: 1000022
    track: by_src
    ip: 172.18.0.0/16

  # Suprimir ICMP ping sweep desde loopback y Docker interno
  - gen-id: 1
    sig-id: 1000005
    track: by_src
    ip: 127.0.0.0/8
  - gen-id: 1
    sig-id: 1000005
    track: by_src
    ip: 172.17.0.0/16
  - gen-id: 1
    sig-id: 1000005
    track: by_src
    ip: 172.18.0.0/16

# Clasificaciones de severidad personalizadas
classification-file: /etc/suricata/classification.config
reference-config-file: /etc/suricata/reference.config


##############################################################################
## Variables de red
## Define las redes que consideras "internas" (HOME_NET)
##############################################################################

vars:
  address-groups:
    HOME_NET: "[172.18.0.0/16,172.17.0.0/16,127.0.0.0/8,::1/128,::ffff:127.0.0.1/128,192.168.0.146/32]"
    EXTERNAL_NET: "!$HOME_NET"
    HTTP_SERVERS: "$HOME_NET"
    SMTP_SERVERS: "$HOME_NET"
    SQL_SERVERS: "$HOME_NET"
    DNS_SERVERS: "$HOME_NET"
    TELNET_SERVERS: "$HOME_NET"
    AIM_SERVERS: "$EXTERNAL_NET"
    DC_SERVERS: "$HOME_NET"
    DNP3_SERVER: "$HOME_NET"
    DNP3_CLIENT: "$HOME_NET"
    MODBUS_CLIENT: "$HOME_NET"
    MODBUS_SERVER: "$HOME_NET"
    ENIP_CLIENT: "$HOME_NET"
    ENIP_SERVER: "$HOME_NET"

  port-groups:
    HTTP_PORTS: "80"
    SHELLCODE_PORTS: "!80"
    ORACLE_PORTS: 1521
    SSH_PORTS: 22
    DNP3_PORTS: 20000
    MODBUS_PORTS: 502
    FILE_DATA_PORTS: "[$HTTP_PORTS,110,143]"
    FTP_PORTS: 21
    GENEVE_PORTS: 6081
    VXLAN_PORTS: 4789
    TEREDO_PORTS: 3544


##############################################################################
## Procesamiento y rendimiento
##############################################################################

detect:
  profile: medium
  custom-values:
    toclient-groups: 3
    toserver-groups: 25
  sgh-mpm-context: auto
  inspection-recursion-limit: 3000

app-layer:
  protocols:
    krb5:
      enabled: yes
    snmp:
      enabled: yes
    ikev2:
      enabled: yes
    tls:
      enabled: yes
      detection-ports:
        dp: 443
    dcerpc:
      enabled: yes
    ftp:
      enabled: yes
      memcap: 64mb
    rdp:
      enabled: yes
    ssh:
      enabled: yes
    http2:
      enabled: yes
    smtp:
      enabled: yes
    imap:
      enabled: detection-only
    dns:
      tcp:
        enabled: yes
        detection-ports:
          dp: 53
      udp:
        enabled: yes
        detection-ports:
          dp: 53
    http:
      enabled: yes
      libhtp:
        default-config:
          personality: IDS
          request-body-limit: 100kb
          response-body-limit: 100kb
          request-body-minimal-inspect-size: 32kb
          request-body-inspect-window: 4kb
          response-body-minimal-inspect-size: 40kb
          response-body-inspect-window: 16kb
          response-body-decompress-layer-limit: 2
          http-body-inline: auto
          swf-decompression:
            enabled: yes
            type: both
            compress-depth: 0
            decompress-depth: 0
          double-decode-path: no
          double-decode-query: no
    nfs:
      enabled: yes
    smb:
      enabled: yes
      detection-ports:
        dp: "[139, 445]"
    tftp:
      enabled: yes
    sip:
      enabled: yes
    rfb:
      enabled: yes
      detection-ports:
        dp: 5900, 5901, 5902, 5903, 5904, 5905, 5906, 5907, 5908, 5909
    mqtt:
      enabled: yes
    enip:
      enabled: yes
    modbus:
      enabled: yes
      detection-ports:
        dp: 502
    dnp3:
      enabled: yes
      detection-ports:
        dp: 20000

stream:
  memcap: 64mb
  checksum-validation: yes
  inline: auto
  reassembly:
    memcap: 256mb
    depth: 1mb
    toserver-chunk-size: 2560
    toclient-chunk-size: 2560
    randomize-chunk-size: yes

host:
  hash-size: 4096
  prealloc: 1000
  memcap: 32mb

defrag:
  memcap: 32mb
  hash-size: 65536
  trackers: 65535
  max-frags: 65535
  prealloc: yes
  timeout: 60

flow:
  memcap: 128mb
  hash-size: 65536
  prealloc: 10000
  emergency-recovery: 30

vlan:
  use-for-tracking: true

flow-timeouts:
  default:
    new: 30
    established: 300
    closed: 0
    bypassed: 100
    emergency-new: 10
    emergency-established: 100
    emergency-closed: 0
    emergency-bypassed: 50
  tcp:
    new: 60
    established: 600
    closed: 60
    bypassed: 100
    emergency-new: 5
    emergency-established: 100
    emergency-closed: 10
    emergency-bypassed: 50
  udp:
    new: 30
    established: 300
    bypassed: 100
    emergency-new: 10
    emergency-established: 100
    emergency-bypassed: 50
  icmp:
    new: 30
    established: 300
    bypassed: 100
    emergency-new: 10
    emergency-established: 100
    emergency-bypassed: 50

decoder:
  teredo:
    enabled: true
  vxlan:
    enabled: true
  vntag:
    enabled: false
  ipv6:
    enabled: true
  erspan:
    typeI:
      enabled: false

# Logging del propio Suricata (no del tráfico)
logging:
  default-log-level: notice
  outputs:
  - console:
      enabled: yes
  - file:
      enabled: yes
      level: info
      filename: suricata.log
  - syslog:
      enabled: no
      facility: local5
      format: "[%i] <%d> -- "

# Profiling (desactivado en producción para mayor rendimiento)
profiling:
  rules:
    enabled: no
    filename: rule_perf.log
    append: yes
    sort: avgticks
    limit: 100
    json: yes
  keywords:
    enabled: no
    filename: keyword_perf.log
    append: yes
  prefilter:
    enabled: no
    filename: prefilter_perf.log
    append: yes
  rulegroups:
    enabled: no
    filename: rule_group_perf.log
    append: yes
  packets:
    enabled: no
    filename: packet_stats.log
    append: yes
    csv:
      enabled: no
      filename: packet_stats.csv
  locks:
    enabled: no
    filename: lock_stats.log
    append: yes
  pcap-log:
    enabled: no
    filename: pcaplog_stats.log
    append: yes
