<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Marshaall — Acceso al panel de ciberseguridad" />
  <title>Marshaall — Acceso</title>
  <link rel="stylesheet" href="/styles.css?v=20260601-glass" />
  </head>

<body class="login-page">
  <div class="login-card card">
    <div class="login-header">
      <img src="/imagenes/logotipo.png" alt="Marshaall Logo" style="height: 64px; margin-bottom: 16px;">
      <h1>MARSHAALL</h1>
      <p>Cybersecurity Intelligence</p>
    </div>
    <div class="form-group">
      <label for="loginUser">Usuario</label>
      <input id="loginUser" type="text" placeholder="admin" autocomplete="username" />
    </div>
    <div class="form-group">
      <label for="loginPass">Contraseña</label>
      <input id="loginPass" type="password" placeholder="••••••••" autocomplete="current-password" />
    </div>
    <button class="btn btn-primary" id="btnLogin" style="width:100%; margin-top:12px;">Entrar</button>
    <p class="msg" id="loginMsg" style="margin-top:16px; color:var(--danger); font-size:12px; text-align:center;"></p>
  </div>

  <script src="/app.js?v=20260601-3"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (window.Marshaall && window.Marshaall.getToken && window.Marshaall.getToken()) {
        window.location.href = '/';
      }
    });
  </script>
</body>

</html>
